<!--README.md-->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="LAVU-OOE" />
    <link rel="manifest" href="site.webmanifest" />
    <title>Wird geladen...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .loader { text-align: center; }
    </style>
</head>
<body>

    <div id="loader" class="loader">
        <h2>System wird geladen...</h2>
        <p>Bitte warten, Sie werden gleich weitergeleitet.</p>
    </div>

    <script>
        const targetFile = 'README.md'; 
        const fallbackUrl = 'https://gaestehaus22.at';

        // 1. Prüfe, ob die README.md auf GitHub verfügbar ist
        fetch(targetFile, { method: 'GET' })
            .then(response => {
                if (response.ok) {
                    // ECHTES STANDALONE: Leite den Browser direkt zur README.md-Datei weiter
                    window.location.replace(targetFile);
                } else {
                    // Falls nicht verfügbar (z.B. 404), nutze das Website-Fallback
                    window.location.replace(fallbackUrl);
                }
            })
            .catch(() => {
                // Bei Netzwerkfehlern oder CORS-Blockaden ebenfalls zum Fallback wechseln
                window.location.replace(fallbackUrl);
            });
    </script>
</body>
</html>
